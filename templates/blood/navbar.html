<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.css">
  <style>
    .topnav{
      width:100%;height:60px;
      background:rgba(8,0,0,0.97);
      border-bottom:1px solid rgba(200,0,20,0.3);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 2.5rem;
      position:fixed;top:0;left:0;z-index:9999;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .nav-brand{
      color:#fff;font-size:16px;font-weight:600;
      display:flex;align-items:center;gap:10px;
      text-decoration:none;flex-shrink:0;
    }
    .nav-brand:hover{color:#fff;text-decoration:none}
    .brand-icon{
      width:32px;height:32px;background:#cc0015;
      border-radius:50%;display:flex;align-items:center;
      justify-content:center;color:#fff;font-size:14px;
      flex-shrink:0;animation:hbnav 1.4s ease-in-out infinite;
    }
    @keyframes hbnav{
      0%,100%{transform:scale(1)}
      14%{transform:scale(1.25)}
      28%{transform:scale(1)}
      42%{transform:scale(1.15)}
    }
    .nav-links{
      display:flex;gap:2rem;list-style:none;
      margin:0;padding:0;align-items:center;
    }
    .nav-links a{
      color:rgba(255,255,255,0.72);text-decoration:none;
      font-size:13.5px;transition:color .2s;
      display:flex;align-items:center;gap:5px;
    }
    .nav-links a:hover{color:#ff4455;text-decoration:none}

    /* hamburger for mobile */
    .ham-btn{
      display:none;flex-direction:column;gap:5px;
      cursor:pointer;padding:4px;background:none;
      border:none;outline:none;
    }
    .ham-btn span{
      width:22px;height:2px;
      background:rgba(255,255,255,.7);
      border-radius:2px;transition:all .3s;display:block;
    }

    /* mobile dropdown */
    .mobile-menu{
      display:none;position:fixed;
      top:60px;left:0;right:0;
      background:rgba(8,0,0,0.98);
      border-bottom:1px solid rgba(200,0,20,.25);
      padding:1rem 1.5rem;
      flex-direction:column;gap:.2rem;
      z-index:9998;
    }
    .mobile-menu.open{display:flex}
    .mobile-menu a{
      color:rgba(255,255,255,.7);text-decoration:none;
      font-size:14px;padding:.7rem .5rem;
      border-bottom:1px solid rgba(200,0,20,.1);
      display:flex;align-items:center;gap:.7rem;
      transition:color .2s;
    }
    .mobile-menu a:last-child{border-bottom:none}
    .mobile-menu a:hover{color:#ff4455;text-decoration:none}

    @media(max-width:640px){
      .topnav{padding:0 1.2rem}
      .nav-links{display:none}
      .ham-btn{display:flex}
    }
  </style>
</head>
<body>

<nav class="topnav">
  <!-- BRAND -->
  <a href="/" class="nav-brand">
    <div class="brand-icon">
      <i class="fas fa-heartbeat"></i>
    </div>
    Blood Bank Management
  </a>

  <!-- DESKTOP LINKS -->
  <ul class="nav-links">
    <li>
      <a href="/"><i class="fas fa-home"></i> Home</a>
    </li>
    <li>
      <a href="/patient/patientlogin"><i class="fas fa-procedures"></i> Patient</a>
    </li>
    <li>
      <a href="/donor/donorlogin"><i class="fas fa-tint"></i> Donor</a>
    </li>
    <li>
      <a href="/adminlogin"><i class="fas fa-user-shield"></i> Admin</a>
    </li>
  </ul>

  <!-- HAMBURGER -->
  <button class="ham-btn" id="hamBtn" onclick="toggleMobileMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <a href="/"><i class="fas fa-home"></i> Home</a>
  <a href="/patient/patientlogin"><i class="fas fa-procedures"></i> Patient</a>
  <a href="/donor/donorlogin"><i class="fas fa-tint"></i> Donor</a>
  <a href="/adminlogin"><i class="fas fa-user-shield"></i> Admin</a>
</div>

<script>
function toggleMobileMenu(){
  document.getElementById('mobileMenu').classList.toggle('open');
}
// close on outside click
document.addEventListener('click', function(e){
  const menu = document.getElementById('mobileMenu');
  const btn = document.getElementById('hamBtn');
  if(!menu.contains(e.target) && !btn.contains(e.target)){
    menu.classList.remove('open');
  }
});
</script>

</body>
</html>
